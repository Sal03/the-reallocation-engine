<div id="next"><div class="mini"></div></div>
<div id="bar"></div>
<div id="counter"></div>
<div id="timer" hidden>00:00</div>
<div id="help"><div>
  → / Space&nbsp; next &nbsp;·&nbsp; ← &nbsp; back &nbsp;·&nbsp; Home/End &nbsp; jump<br>
  f &nbsp; fullscreen &nbsp;·&nbsp; s &nbsp; presenter view &nbsp;·&nbsp; o &nbsp; overview &nbsp;·&nbsp; ? &nbsp; this help
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
  const slides = Array.from(document.querySelectorAll('.slide'));
  let i = Math.max(0, (parseInt(location.hash.slice(1))||1) - 1);
  const bar = document.getElementById('counter');
  const prog = document.getElementById('bar');
  const nextMini = document.querySelector('#next .mini');

  function show(n){
    i = Math.max(0, Math.min(slides.length-1, n));
    slides.forEach((s,k)=>s.classList.toggle('current', k===i));
    bar.textContent = (i+1)+' / '+slides.length;
    prog.style.width = ((i+1)/slides.length*100)+'%';
    if(!document.body.classList.contains('study')) history.replaceState(null,'','#'+(i+1));
    if(document.body.classList.contains('presenter')){
      nextMini.innerHTML = slides[i+1] ? slides[i+1].innerHTML : '<em style="color:var(--color-secondary)">— end —</em>';
    }
  }
  function go(d){ show(i+d); }

  // presenter timer
  let t0=null, timer=document.getElementById('timer');
  setInterval(()=>{ if(t0){const s=Math.floor((Date.now()-t0)/1000);
    timer.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}},500);

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(1);}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(-1);}
    else if(e.key==='Home'){show(0);} else if(e.key==='End'){show(slides.length-1);}
    else if(e.key==='f'){ if(!document.fullscreenElement)document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); }
    else if(e.key==='s'){ document.body.classList.toggle('presenter'); if(!t0)t0=Date.now(); timer.hidden=!document.body.classList.contains('presenter'); show(i); }
    else if(e.key==='o'){ document.body.classList.toggle('overview'); }
    else if(e.key==='?'){ const h=document.getElementById('help'); h.style.display = h.style.display==='flex'?'none':'flex'; }
    else if(e.key==='Escape'){ document.getElementById('help').style.display='none'; document.body.classList.remove('overview'); }
  });
  document.getElementById('deck').addEventListener('click',e=>{
    if(document.body.classList.contains('overview')){ const s=e.target.closest('.slide'); if(s){show(slides.indexOf(s));document.body.classList.remove('overview');} }
  });
  document.querySelectorAll('.reveal>summary').forEach(su=>su.addEventListener('click',e=>{e.preventDefault();su.parentElement.classList.toggle('open');}));

  // study mode shows everything; live/presenter start at slide i
  if(!document.body.classList.contains('study')) show(i);


  // ===== animated D3 figure library (brutalist tokens, enter transitions) =====
  function C(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
  const GRAY='#787878', GRAY2='#ADADAD';
  function svgOf(el,vb){el.innerHTML='';const w=el.clientWidth||700,h=el.clientHeight||360;
    const s=d3.select(el).append('svg').attr('width',w).attr('height',h).attr('viewBox','0 0 '+w+' '+h).attr('role','img');
    return {s,w,h};}
  const FIG={
    bars(el,d){const {s,w,h}=svgOf(el);const m={t:28,r:20,b:46,l:40},cw=w-m.l-m.r,ch=h-m.t-m.b;
      const g=s.append('g').attr('transform',`translate(${m.l},${m.t})`);
      const x=d3.scaleBand().domain(d.items.map(i=>i.k)).range([0,cw]).padding(.28);
      const y=d3.scaleLinear().domain([0,d.max||100]).range([ch,0]);
      g.append('line').attr('x1',0).attr('x2',cw).attr('y1',ch).attr('y2',ch).attr('stroke',C('--color-secondary'));
      g.selectAll('rect').data(d.items).join('rect').attr('x',i=>x(i.k)).attr('width',x.bandwidth())
        .attr('y',ch).attr('height',0).attr('fill',i=>i.accent?C('--color-red'):GRAY)
        .transition().duration(650).delay((i,k)=>k*120).attr('y',i=>y(i.v)).attr('height',i=>ch-y(i.v));
      g.selectAll('.v').data(d.items).join('text').attr('class','v').attr('x',i=>x(i.k)+x.bandwidth()/2)
        .attr('y',i=>y(i.v)-7).attr('text-anchor','middle').attr('font-family','var(--mono)').attr('font-size',12)
        .attr('fill',C('--color-secondary')).attr('opacity',0).text(i=>i.v+(d.unit||'')).transition().delay((i,k)=>400+k*120).duration(300).attr('opacity',1);
      g.selectAll('.k').data(d.items).join('text').attr('class','k').attr('x',i=>x(i.k)+x.bandwidth()/2)
        .attr('y',ch+20).attr('text-anchor','middle').attr('font-family','var(--sans)').attr('font-size',12).attr('fill',C('--color-ink')).text(i=>i.k);
    },
    flow(el,d){const {s,w,h}=svgOf(el);const n=d.steps.length, gap=14, bw=(w-40-gap*(n-1))/n, bh=64, y=(h-bh)/2;
      const g=s.append('g').attr('transform','translate(20,0)');
      d.steps.forEach((st,i)=>{const x=i*(bw+gap);
        const acc=i===d.accentIndex;
        const box=g.append('g').attr('opacity',0);
        box.append('rect').attr('x',x).attr('y',y).attr('width',bw).attr('height',bh)
          .attr('fill',acc?C('--color-white'):'#F5F5F5').attr('stroke',acc?C('--color-red'):C('--color-border')).attr('stroke-width',acc?2:1);
        box.append('text').attr('x',x+bw/2).attr('y',y+bh/2+4).attr('text-anchor','middle').attr('font-family','var(--sans)')
          .attr('font-size',13).attr('fill',C('--color-ink')).text(st);
        box.transition().delay(i*240).duration(420).attr('opacity',1);
        if(i<n-1){g.append('path').attr('d',`M ${x+bw} ${y+bh/2} L ${x+bw+gap} ${y+bh/2}`).attr('stroke',C('--color-ink')).attr('stroke-width',1.5)
          .attr('marker-end','url(#fa)').attr('opacity',0).transition().delay(i*240+200).duration(220).attr('opacity',1);}
      });
      s.append('defs').html('<marker id="fa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="'+C('--color-ink')+'"/></marker>');
    },
    stack(el,d){const {s,w,h}=svgOf(el);const n=d.tiers.length, gap=14, bh=(h-20-gap*(n-1))/n;
      // widest at bottom: tiers[0] bottom
      d.tiers.forEach((t,i)=>{const fromBottom=i; const y=h-10-(fromBottom+1)*bh-fromBottom*gap;
        const wd=0.55*w+(fromBottom*0.13*w); const x=(w-wd)/2; const acc=i===d.accentIndex;
        const gg=s.append('g').attr('opacity',0).attr('transform','translate(0,12)');
        gg.append('rect').attr('x',x).attr('y',y).attr('width',wd).attr('height',bh)
          .attr('fill',acc?C('--color-white'):'#F5F5F5').attr('stroke',acc?C('--color-red'):C('--color-ink')).attr('stroke-width',acc?2:1);
        gg.append('text').attr('x',w/2).attr('y',y+bh/2-2).attr('text-anchor','middle').attr('font-family','var(--sans)').attr('font-size',13).attr('fill',C('--color-ink')).text(t.label);
        gg.append('text').attr('x',w/2).attr('y',y+bh/2+15).attr('text-anchor','middle').attr('font-family','var(--sans)').attr('font-size',11).attr('fill',C('--color-secondary')).text(t.sub||'');
        gg.transition().delay((n-1-i)*240).duration(450).attr('opacity',1).attr('transform','translate(0,0)');
      });
    },
    twocol(el,d){const {s,w,h}=svgOf(el);const colW=w*0.4, lx=w*0.04, rx=w*0.56, ty=40;
      s.append('line').attr('x1',w/2).attr('x2',w/2).attr('y1',20).attr('y2',h-44).attr('stroke',C('--color-ink')).attr('stroke-width',4).attr('opacity',0)
        .transition().duration(500).attr('opacity',1);
      [['left',lx,d.left,false],['right',rx,d.right,true]].forEach(([side,x,col,forb])=>{
        const g=s.append('g').attr('opacity',0).attr('transform','translate(0,10)');
        g.append('text').attr('x',x+colW/2).attr('y',ty).attr('text-anchor','middle').attr('font-family','var(--serif)').attr('font-size',16).attr('fill',C('--color-ink')).text(col.title);
        col.items.forEach((it,i)=>{const yy=ty+30+i*48;
          g.append('rect').attr('x',x).attr('y',yy).attr('width',colW).attr('height',38)
            .attr('fill',forb?'#F5F5F5':C('--color-white')).attr('stroke',forb?C('--color-secondary'):C('--color-red')).attr('stroke-width',forb?1:1.5).attr('stroke-dasharray',forb?'4 3':null);
          g.append('text').attr('x',x+colW/2).attr('y',yy+24).attr('text-anchor','middle').attr('font-family','var(--sans)').attr('font-size',12).attr('fill',C('--color-ink')).text(it);});
        g.transition().delay(side==='left'?200:450).duration(450).attr('opacity',1).attr('transform','translate(0,0)');
      });
      s.append('text').attr('x',w/2).attr('y',h-20).attr('text-anchor','middle').attr('font-family','var(--mono)').attr('font-size',11).attr('fill',C('--color-secondary')).text(d.divider||'');
    },
    gatebar(el,d){const {s,w,h}=svgOf(el);const m=40,bw=w-2*m,y=h*0.42,bh=54;const x=v=>m+(v/d.max)*bw;
      s.append('rect').attr('x',m).attr('y',y).attr('width',bw).attr('height',bh).attr('fill','#F5F5F5').attr('stroke',C('--color-border'));
      s.append('rect').attr('x',m).attr('y',y).attr('width',0).attr('height',bh).attr('fill',C('--color-red'))
        .transition().duration(800).attr('width',x(d.used)-m);
      // soft marker
      const sm=s.append('g').attr('opacity',0);
      sm.append('line').attr('x1',x(d.soft)).attr('x2',x(d.soft)).attr('y1',y-18).attr('y2',y+bh+8).attr('stroke',C('--color-ink')).attr('stroke-width',1.5).attr('stroke-dasharray','4 3');
      sm.append('text').attr('x',x(d.soft)).attr('y',y-24).attr('text-anchor','end').attr('font-family','var(--sans)').attr('font-size',11).attr('fill',C('--color-ink')).text(d.softLabel);
      sm.transition().delay(500).duration(300).attr('opacity',1);
      const hm=s.append('g').attr('opacity',0);
      hm.append('line').attr('x1',x(d.hard)).attr('x2',x(d.hard)).attr('y1',y-18).attr('y2',y+bh+8).attr('stroke',C('--color-red')).attr('stroke-width',2.5);
      hm.append('text').attr('x',x(d.hard)).attr('y',y-24).attr('text-anchor','end').attr('font-family','var(--sans)').attr('font-size',11).attr('fill',C('--color-red')).text(d.hardLabel);
      hm.transition().delay(700).duration(300).attr('opacity',1);
      s.append('text').attr('x',m).attr('y',y+bh+22).attr('font-family','var(--mono)').attr('font-size',11).attr('fill',C('--color-secondary')).text('Day 0');
    },
    quadrant(el,d){const {s,w,h}=svgOf(el);const m={t:30,r:24,b:44,l:60},cw=w-m.l-m.r,ch=h-m.t-m.b;
      const g=s.append('g').attr('transform',`translate(${m.l},${m.t})`);
      g.append('rect').attr('x',cw/2).attr('y',0).attr('width',cw/2).attr('height',ch/2).attr('fill','#FBECEE');
      g.append('rect').attr('x',0).attr('y',ch/2).attr('width',cw/2).attr('height',ch/2).attr('fill','#F5F5F5');
      g.append('line').attr('x1',cw/2).attr('x2',cw/2).attr('y1',0).attr('y2',ch).attr('stroke',C('--color-border')).attr('stroke-dasharray','4 4');
      g.append('line').attr('x1',0).attr('x2',cw).attr('y1',ch/2).attr('y2',ch/2).attr('stroke',C('--color-border')).attr('stroke-dasharray','4 4');
      g.append('line').attr('x1',0).attr('x2',0).attr('y1',0).attr('y2',ch).attr('stroke',C('--color-ink')).attr('stroke-width',1.5);
      g.append('line').attr('x1',0).attr('x2',cw).attr('y1',ch).attr('y2',ch).attr('stroke',C('--color-ink')).attr('stroke-width',1.5);
      const lab=[['tr',cw*0.75,ch*0.25,C('--color-red'),16],['tl',cw*0.25,ch*0.25,C('--color-secondary'),14],['bl',cw*0.25,ch*0.75,C('--color-secondary'),14],['br',cw*0.75,ch*0.75,C('--color-secondary'),14]];
      lab.forEach(([k,xx,yy,col,fs])=>g.append('text').attr('x',xx).attr('y',yy).attr('text-anchor','middle').attr('font-family','var(--serif)').attr('font-size',fs).attr('fill',col).text(d.regions[k]));
      const px=v=>v*cw, py=v=>ch-v*ch;
      const pts=d.points;
      g.append('line').attr('x1',px(pts[0].x)).attr('y1',py(pts[0].y)).attr('x2',px(pts[0].x)).attr('y2',py(pts[0].y))
        .attr('stroke',C('--color-ochre')).attr('stroke-dasharray','2 3')
        .transition().delay(500).duration(500).attr('x2',px(pts[1].x)).attr('y2',py(pts[1].y));
      g.selectAll('circle').data(pts).join('circle').attr('cx',p=>px(p.x)).attr('cy',p=>py(p.y)).attr('r',0)
        .attr('fill',p=>p.accent?C('--color-red'):C('--color-ink')).transition().delay((p,i)=>i*250).duration(350).attr('r',7);
      g.selectAll('.pl').data(pts).join('text').attr('class','pl').attr('x',p=>px(p.x)).attr('y',p=>py(p.y)-12).attr('text-anchor','middle')
        .attr('font-family','var(--mono)').attr('font-size',10).attr('fill',p=>p.accent?C('--color-red'):C('--color-ink')).attr('opacity',0).text(p=>p.label)
        .transition().delay(600).duration(300).attr('opacity',1);
      s.append('text').attr('x',m.l+cw/2).attr('y',h-12).attr('text-anchor','middle').attr('font-family','var(--sans)').attr('font-size',11).attr('fill',C('--color-secondary')).text(d.xlab);
      s.append('text').attr('transform',`translate(16,${m.t+ch/2}) rotate(-90)`).attr('text-anchor','middle').attr('font-family','var(--sans)').attr('font-size',11).attr('fill',C('--color-secondary')).text(d.ylab);
    },
    gauge(el,d){const {s,w,h}=svgOf(el);const m=40,bw=w-2*m,y=h*0.45,bh=40;const x=v=>m+(v/100)*bw;
      d.zones.forEach((z,i)=>{const g=s.append('g').attr('opacity',0);
        g.append('rect').attr('x',x(z.from)).attr('y',y).attr('width',x(z.to)-x(z.from)).attr('height',bh)
          .attr('fill',z.accent?C('--color-red'):(i%2?'#ECECEC':'#F5F5F5')).attr('stroke',C('--color-border'));
        g.append('text').attr('x',(x(z.from)+x(z.to))/2).attr('y',y+bh+18).attr('text-anchor','middle').attr('font-family','var(--sans)').attr('font-size',11).attr('fill',z.accent?C('--color-red'):C('--color-secondary')).text(z.label);
        g.transition().delay(i*150).duration(350).attr('opacity',1);});
      // target line
      s.append('line').attr('x1',x(d.target)).attr('x2',x(d.target)).attr('y1',y-16).attr('y2',y+bh).attr('stroke',C('--color-ink')).attr('stroke-dasharray','4 3').attr('opacity',0).transition().delay(600).duration(300).attr('opacity',1);
      s.append('text').attr('x',x(d.target)).attr('y',y-20).attr('text-anchor','middle').attr('font-family','var(--mono)').attr('font-size',10).attr('fill',C('--color-ink')).attr('opacity',0).text(d.target+'% target').transition().delay(700).duration(300).attr('opacity',1);
      // pointer at value
      const p=s.append('g').attr('opacity',0).attr('transform',`translate(${x(0)},0)`);
      p.append('polygon').attr('points',`${0},${y-6} ${-8},${y-22} ${8},${y-22}`).attr('fill',C('--color-ink'));
      p.append('text').attr('x',12).attr('y',y-12).attr('font-family','var(--mono)').attr('font-size',11).attr('fill',C('--color-ink')).text(d.value+'%');
      p.transition().delay(800).duration(600).attr('opacity',1).attr('transform',`translate(${x(d.value)},0)`);
    }
  };
  function drawFig(el){const t=el.dataset.type, d=JSON.parse(el.dataset.d); if(FIG[t]) FIG[t](el,d);}
  document.querySelectorAll('.d3fig').forEach(el=>{drawFig(el); new ResizeObserver(()=>drawFig(el)).observe(el);});

</script>
</body>
</html>
